name: TheAcharProject
options:
  bundleIdPrefix: com.example

targets:
  TheAcharProject:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: "."
        excludes:
          - "Info.plist"
          - "project.yml"
          - "build/**"
          - "*.xcodeproj/**"
    info:
      path: Info.plist
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.example.theacharproject
      SWIFT_VERSION: "5.9"
      IPHONEOS_DEPLOYMENT_TARGET: "16.0"
      CODE_SIGN_IDENTITY: ""
      CODE_SIGNING_REQUIRED: NO
      CODE_SIGNING_ALLOWED: NO