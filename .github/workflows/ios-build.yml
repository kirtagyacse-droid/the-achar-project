name: iOS Build Simulator App

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  build:
    name: Build iOS App for Simulator
    runs-on: macos-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.0'

      - name: Create Temporary Xcode Project
        run: |
          # We generate a quick light-weight project structure for compiler validation and simulator deployment
          mkdir -p build-temp
          cd build-temp
          
          # Use swift package manager to create an executable structure or generate temporary XcodeProj 
          # Or create a swift file structure and compile it directly using xcodebuild command line
          # This compiles our SwiftUI codebase files directly into an executable bundle.
          
          xcodebuild -workspace-empty -timeout 10 || true
          
      - name: Compile Swift Source Code Validation
        run: |
          # Directly validate the syntax of all swift files to ensure Appetize or Xcode won't throw compile errors
          xcrun -sdk iphonesimulator swiftc \
            -target x86_64-apple-ios17.0-simulator \
            -sdk $(xcrun --sdk iphonesimulator --show-sdk-path) \
            ios-app/*.swift \
            -o build-temp/TheAcharProjectSim
            
      - name: Package Simulator App Bundle
        run: |
          mkdir -p build-temp/TheAcharProject.app
          cp build-temp/TheAcharProjectSim build-temp/TheAcharProject.app/TheAcharProject
          
          # Create a dummy Info.plist required for iOS simulation loading
          cat <<EOF > build-temp/TheAcharProject.app/Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>TheAcharProject</string>
              <key>CFBundleIdentifier</key>
              <string>com.example.theacharproject</string>
              <key>CFBundleName</key>
              <string>The Achar Project</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>LSRequiresIPhoneOS</key>
              <true/>
              <key>UILaunchStoryboardName</key>
              <string>LaunchScreen</string>
          </dict>
          </plist>
          EOF
          
          # Zip the bundle for Appetize uploading
          cd build-temp
          zip -r ../TheAcharProject-Simulator.zip TheAcharProject.app

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v3
        with:
          name: ios-simulator-app
          path: TheAcharProject-Simulator.zip
