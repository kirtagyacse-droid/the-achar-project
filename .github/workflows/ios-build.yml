name: iOS Build Simulator App

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build iOS App for Simulator
    runs-on: macos-15

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Select Xcode Version
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Show Xcode Version
        run: xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: |
          cd ios-app
          xcodegen generate

      - name: Build iOS App for Simulator
        run: |
          cd ios-app
          set -o pipefail
          xcodebuild -project TheAcharProject.xcodeproj \
            -scheme TheAcharProject \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=18.2' \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build 2>&1 | tee build_log.txt; \
          BUILD_EXIT=${PIPESTATUS}; \
          if [ $BUILD_EXIT -ne 0 ]; then \
            echo "--- BUILD FAILED. Raw errors below: ---"; \
            grep -E "error:|warning:" build_log.txt | head -60; \
            exit $BUILD_EXIT; \
          fi

      - name: Package Simulator App Bundle
        run: |
          APP_PATH=$(find ios-app/build/Build/Products/Debug-iphonesimulator -name "*.app" -maxdepth 1 | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "Error: No .app found"
            find ios-app/build -name "*.app" -type d || true
            exit 1
          fi
          APP_NAME=$(basename "$APP_PATH")
          cd ios-app/build/Build/Products/Debug-iphonesimulator
          zip -r "$GITHUB_WORKSPACE/TheAcharProject.zip" "$APP_NAME"

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TheAcharProject-iOS
          path: TheAcharProject.zip