name: iOS Build Simulator App

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  build:
    name: Build iOS App for Simulator
    runs-on: macos-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: |
          cd ios-app
          xcodegen generate

      - name: Build iOS App for Simulator
        run: |
          cd ios-app
          xcodebuild -project TheAcharProject.xcodeproj \
            -scheme TheAcharProject \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 15 Pro,OS=17.0' \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Package Simulator App Bundle
        run: |
          # The built .app is located in the derived data folder
          APP_PATH=$(find ios-app/build/Build/Products/Debug-iphonesimulator -name "*.app" -maxdepth 1)
          
          # Move to the directory containing the .app to zip it properly
          cd $(dirname "$APP_PATH")
          APP_NAME=$(basename "$APP_PATH")
          
          # Zip the .app directory
          zip -r "$GITHUB_WORKSPACE/TheAcharProject.zip" "$APP_NAME"

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TheAcharProject-iOS
          path: TheAcharProject.zip
